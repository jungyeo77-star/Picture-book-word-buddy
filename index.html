<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Picture Book Word Buddy</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Arial", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: linear-gradient(135deg, #fff7e8, #eaf7f3);
      color: #2f3a3d;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 28px;
    }

    .container {
      width: 100%;
      max-width: 860px;
      background: #ffffff;
      border-radius: 28px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.10);
      padding: 36px;
      text-align: center;
    }

    h1 {
      font-size: 42px;
      margin: 10px 0 14px;
      color: #355c63;
    }

    .subtitle {
      font-size: 21px;
      line-height: 1.6;
      color: #5f6f73;
      margin-bottom: 28px;
    }

    .book-list {
      display: grid;
      gap: 18px;
      margin-top: 26px;
    }

    .book-card {
      background: #f7fbfb;
      border: 3px solid #cbe7e2;
      border-radius: 24px;
      padding: 24px;
      text-align: left;
    }

    .book-title {
      font-size: 26px;
      font-weight: 800;
      color: #355c63;
      margin-bottom: 8px;
    }

    .book-author {
      font-size: 18px;
      color: #667;
      margin-bottom: 18px;
    }

    .book-link {
      display: inline-block;
      text-decoration: none;
      background: #b9ded7;
      color: #263b3e;
      font-size: 21px;
      font-weight: 800;
      padding: 15px 24px;
      border-radius: 18px;
      box-shadow: 0 5px 0 #8fbdb5;
    }

    .book-link:hover {
      background: #a9d5cd;
    }

    .note {
      margin-top: 28px;
      font-size: 17px;
      color: #718085;
    }

    @media (max-width: 600px) {
      .container {
        padding: 24px;
      }

      h1 {
        font-size: 32px;
      }

      .subtitle {
        font-size: 18px;
      }

      .book-title {
        font-size: 23px;
      }

      .book-link {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <h1>Picture Book Word Buddy</h1>

    <p class="subtitle">
      Choose a picture book and practice the story words.
    </p>

    <section class="book-list">
      <article class="book-card">
        <div class="book-title">This Is Not My Hat</div>
        <div class="book-author">by Jon Klassen</div>
        <a class="book-link" href="./This-is-not-my-hat/">Start Word Game</a>
      </article>

      <!--
        다음 책을 추가할 때는 아래 형식을 복사해서 사용하세요.

        <article class="book-card">
          <div class="book-title">Tiger in My Soup</div>
          <div class="book-author">by Kashmira Sheth</div>
          <a class="book-link" href="./Tiger-in-my-soup/">Start Word Game</a>
        </article>
      -->
    </section>

    <p class="note">
      More picture book word games will be added later.
    </p>
  </main>
</body>
</html>
